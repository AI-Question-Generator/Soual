<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>سؤال — موادي</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="subjects-styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="subjects-data.jsx"></script>
<script type="text/babel" src="subjects-shell.jsx"></script>
<script type="text/babel" src="subjects-main.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

function App() {
  const [subject, setSubject]     = useState('english');
  const [projectId, setProjectId] = useState('default');
  const [customProjects, setCustomProjects] = useState(INITIAL_CUSTOM_PROJECTS);
  const [selected, setSelected]   = useState(new Set());
  const [drawerOpen, setDrawer]   = useState(false);
  const [toast, setToast]         = useState(null);

  const subjectObj = SUBJECTS.find(s => s.slug === subject);
  const isReady    = subjectObj?.ready;

  // When switching subject / project, clear selection
  useEffect(() => { setSelected(new Set()); }, [subject, projectId]);

  function toggleLesson(id) {
    setSelected(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  }
  function selectUnit(unitId) {
    const unit = ENGLISH_UNITS.find(u => u.id === unitId);
    const ids  = unit.lessons.map(l => l.id);
    const allOn = ids.every(id => selected.has(id));
    setSelected(prev => {
      const n = new Set(prev);
      if (allOn) ids.forEach(id => n.delete(id));
      else ids.forEach(id => n.add(id));
      return n;
    });
  }
  function selectAll() {
    const ids = ENGLISH_UNITS.flatMap(u => u.lessons.map(l => l.id));
    setSelected(new Set(ids));
  }
  function clearAll() { setSelected(new Set()); }

  function createProject({ title, desc }) {
    const id = 'p' + Date.now();
    setCustomProjects(prev => [...prev, { id, title, desc, count: 0 }]);
    setDrawer(false);
    setProjectId(id);
    showToast('تم إنشاء المشروع. أضف دروسًا إليه من الكتاب المدرسي.');
  }

  function generate() {
    showToast(`سيتم توليد الأسئلة من ${selected.size} دروس — (نموذج أوّلي)`);
  }

  function showToast(msg) {
    setToast(msg);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => setToast(null), 3200);
  }

  const totalLessons = useMemo(
    () => ENGLISH_UNITS.reduce((n, u) => n + u.lessons.length, 0),
    []
  );

  return (
    <div className="sx-app">
      <Navbar/>
      <SubjectTabs active={subject} onChange={setSubject}/>

      {!isReady ? (
        <LockedSubject subject={subjectObj}/>
      ) : (
        <>
          <IdentityTile
            selectedCount={selected.size}
            totalLessons={totalLessons}
            unitCount={ENGLISH_UNITS.length}
            projectCount={customProjects.length + 1}
          />

          <div className="sx-layout">
            <ProjectRail
              projects={customProjects}
              activeProjectId={projectId}
              onPick={setProjectId}
              onCreate={() => setDrawer(true)}
            />

            <MainPanel
              projectId={projectId}
              customProjects={customProjects}
              units={ENGLISH_UNITS}
              selected={selected}
              onToggle={toggleLesson}
              onSelectUnit={selectUnit}
              onSelectAll={selectAll}
              onClearAll={clearAll}
            />
          </div>
        </>
      )}

      {selected.size > 0 && (
        <GenerateBar count={selected.size} onClear={clearAll} onGenerate={generate}/>
      )}

      <CreateProjectDrawer
        open={drawerOpen}
        onClose={() => setDrawer(false)}
        onSubmit={createProject}
      />

      {toast && (
        <div className="sx-toast">
          <i className="pi pi-check-circle"/>
          <span>{toast}</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
