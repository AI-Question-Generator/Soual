<footer class="bg-slate-950 text-slate-400 relative overflow-hidden">
  <!-- Subtle top gradient line -->
  <div
    class="absolute top-0 left-0 w-full h-px bg-linear-to-r from-transparent via-slate-800 to-transparent"
  ></div>

  <div class="container py-12">
    <div class="flex flex-col md:flex-row items-center justify-between gap-8">
      <!-- Brand & Copyright -->
      <div class="flex items-center gap-4 group/brand">
        <div
          class="w-10 h-10 rounded-xl bg-linear-to-br from-main-600 to-main-700 flex items-center justify-center shadow-lg shadow-main-900/20 group-hover/brand:shadow-main-600/30 transition-all duration-300"
        >
          <i class="pi pi-question-circle text-white text-xl"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-xl font-bold text-slate-100 tracking-tight">سؤال</span>
          <span class="text-xs text-slate-500 font-mono"
            >© {{ currentYear }} جميع الحقوق محفوظة</span
          >
        </div>
      </div>

      <!-- Navigation Links -->
      <nav class="flex flex-wrap justify-center items-center gap-8">
        @for (section of footerSections; track section.title) {
          @for (link of section.links; track link.label) {
            <a
              class="text-sm font-medium hover:text-white transition-colors duration-300 relative group py-1"
              [href]="link.href"
            >
              {{ link.label }}
              <span
                class="absolute bottom-0 right-0 w-0 h-0.5 bg-main-500 transition-all duration-300 group-hover:w-full"
              ></span>
            </a>
          }
        }
      </nav>

      <!-- Socials -->
      <div class="flex items-center gap-3">
        @for (social of socialLinks; track social.label) {
          <a
            class="w-10 h-10 rounded-full bg-slate-900 border border-slate-800/50 flex items-center justify-center text-slate-400 hover:text-white hover:border-main-600 hover:bg-main-600 transition-all duration-300 group"
            [href]="social.href"
            [attr.aria-label]="social.label"
          >
            <i [class]="`pi ${social.icon} text-lg group-hover:scale-110 transition-transform`"></i>
          </a>
        }
      </div>
    </div>
  </div>
</footer>
