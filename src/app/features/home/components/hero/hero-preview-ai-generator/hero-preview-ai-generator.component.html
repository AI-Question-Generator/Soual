<div
  class="min-w-64 bg-white card-shadow rounded-2xl p-4 border border-slate-100 transition-all duration-300 sm:rotate-2 sm:hover:rotate-0 space-y-4"
>
  <!-- Header -->
  <div class="flex items-center gap-2">
    <span
      class="w-9 h-9 rounded-lg flex-center bg-secondary-400 text-white shadow-lg shadow-secondary-500/30"
    >
      <i class="pi pi-sparkles text-sm"></i>
    </span>
    <div>
      <h4 class="font-bold text-sm text-slate-800">توليد بالذكاء الاصطناعي</h4>
      <span class="text-[10px] text-slate-500">من ملف PDF</span>
    </div>
  </div>

  <!-- Upload Area -->
  <div
    class="bg-linear-to-br from-slate-50 to-slate-100 rounded-xl p-3 border border-dashed border-slate-300"
  >
    <div class="flex items-center gap-2">
      <i class="pi pi-file-pdf text-red-500 text-lg"></i>
      <div class="flex-1">
        <p class="text-xs font-semibold text-slate-700">الفصل_الأول_فيزياء.pdf</p>
        <p class="text-[10px] text-slate-500">2.4 MB</p>
      </div>
      <i class="pi pi-check-circle text-green-500"></i>
    </div>
  </div>

  <!-- Settings -->
  <div class="space-y-2">
    <div class="flex items-center justify-between text-xs">
      <span class="text-slate-700">عدد الأسئلة</span>
      <span class="font-bold text-main-600 bg-main-50 px-2 py-0.5 rounded">20 سؤال</span>
    </div>
    <div class="flex items-center justify-between text-xs">
      <span class="text-slate-700">مستوى الصعوبة</span>
      <span class="text-slate-500">متوسط</span>
    </div>
  </div>

  <!-- Progress -->
  <div class="bg-main-50 rounded-xl p-3 border border-main-100">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs font-semibold text-main-700">
        {{ isComplete() ? 'تم الاكتمال' : 'جاري التوليد...' }}
      </span>
      <span class="text-xs font-bold text-main-600"> {{ loadingProgress() }}% </span>
    </div>

    <div class="w-full h-1.5 bg-main-100 rounded-full overflow-hidden">
      <div
        class="h-full bg-linear-to-r from-main-500 to-main-400 rounded-full transition-[width] duration-150 ease-linear"
        [style.width.%]="loadingProgress()"
        [class.animate-pulse]="!isComplete()"
      ></div>
    </div>

    <p
      class="text-[10px] text-main-600 mt-2 text-center transition-colors"
      [class.text-green-600]="isComplete()"
    >
      <i
        class="pi text-[8px] me-1"
        [class.pi-spin]="!isComplete()"
        [class.pi-spinner]="!isComplete()"
        [class.pi-check]="isComplete()"
      ></i>
      تم توليد {{ questionsGenerated() }} من {{ totalQuestions }} سؤال
    </p>
  </div>
</div>
